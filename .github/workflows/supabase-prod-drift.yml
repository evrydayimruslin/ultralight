name: Supabase Prod Drift

# Standalone, read-only drift watch for production. Production migrations only
# deploy on a manual dispatch, so drift (e.g. a hand edit in the SQL editor)
# could otherwise sit undetected between deploys. This catches it nightly and
# emails on failure.
#
# Intentionally does NOT use `environment: production` — that environment may
# carry required-reviewer protection, which would stall an unattended schedule.
# The check is read-only (db diff against a throwaway shadow DB); it reads the
# same production secrets directly as repository secrets.

on:
  schedule:
    - cron: '17 8 * * *' # nightly ~08:17 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-prod-drift
  cancel-in-progress: false

jobs:
  drift:
    name: Check production schema drift
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
      SUPABASE_ENV_NAME: production

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check for production schema drift
        run: bash ./scripts/supabase/check-drift.sh
