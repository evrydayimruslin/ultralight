name: Data Worker Deploy

# The ultralight-data worker (worker/) is the tenant-isolated R2/D1 data plane.
# It is a SEPARATE deployable that the API deploy does NOT ship — historically it
# had no CI at all, so the per-tenant enforcement code could sit undeployed.
#
# It FAILS CLOSED in production: with DATA_TENANT_ENFORCE=1 (set in
# worker/wrangler.toml) but DATA_TENANT_SECRET unset/default it returns 503. So
# the actual deploy is MANUAL-ONLY (workflow_dispatch) to guarantee the secret is
# set on BOTH this worker and the API worker first. See docs/DATA_WORKER_RELIGHT.md.

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/data-worker-deploy.yml'
  pull_request:
    paths:
      - 'worker/**'
      - '.github/workflows/data-worker-deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    name: Verify data worker (dry run)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: api/.nvmrc
      - name: Wrangler dry run
        run: npx wrangler@4.67.0 deploy --dry-run

  deploy:
    name: Deploy data worker (manual)
    # Manual only: never auto-deploy. The production footgun guard fails closed if
    # DATA_TENANT_SECRET isn't set on both workers first — auto-deploy could 503
    # the entire data plane.
    if: github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: data-worker-production-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: api/.nvmrc
      - name: Deploy
        run: npx wrangler@4.67.0 deploy
