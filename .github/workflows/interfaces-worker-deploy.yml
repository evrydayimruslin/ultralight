name: Interfaces Worker Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'interfaces-worker/**'
      - '.github/workflows/interfaces-worker-deploy.yml'
  pull_request:
    paths:
      - 'interfaces-worker/**'
      - '.github/workflows/interfaces-worker-deploy.yml'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy staging or production.'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  verify:
    name: Verify interfaces worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: interfaces-worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: interfaces-worker/package-lock.json

      - name: Install Deno
        run: |
          curl -fsSL -o /tmp/deno.zip https://github.com/denoland/deno/releases/download/v2.6.10/deno-x86_64-unknown-linux-gnu.zip
          mkdir -p "$HOME/.deno/bin"
          unzip -q -o /tmp/deno.zip -d "$HOME/.deno/bin"
          chmod +x "$HOME/.deno/bin/deno"
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"
          "$HOME/.deno/bin/deno" --version

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: deno test --no-check --no-lock src/serve.test.ts

      - name: Wrangler Dry Run (production)
        run: npm run deploy:dry-run

      - name: Wrangler Dry Run (staging)
        run: npm run deploy:staging:dry-run

  deploy_staging:
    name: Deploy interfaces worker to staging
    runs-on: ubuntu-latest
    needs: verify
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.deploy_target == 'staging'
    environment: staging
    concurrency:
      group: interfaces-worker-staging-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: interfaces-worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: interfaces-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy staging worker
        run: npm run deploy:staging

  deploy_production:
    name: Deploy interfaces worker to production
    runs-on: ubuntu-latest
    needs: verify
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event.inputs.deploy_target == 'production'
    environment: production
    concurrency:
      group: interfaces-worker-production-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: interfaces-worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: interfaces-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy production worker
        run: npm run deploy
