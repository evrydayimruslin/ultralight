name: API Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'api/**'
      - 'shared/**'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy staging or production.'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  verify:
    name: Verify API before deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: api/package-lock.json

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:full

      - name: Wrangler Dry Run (production)
        run: npm run deploy:dry-run

      - name: Wrangler Dry Run (staging)
        run: npx wrangler deploy --config wrangler.toml --env staging --dry-run

  deploy_staging:
    name: Deploy API to staging
    runs-on: ubuntu-latest
    needs: verify
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.deploy_target == 'staging'
    environment: staging
    concurrency:
      group: api-staging-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: api
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy staging worker
        run: npm run deploy:staging

  deploy_production:
    name: Deploy API to production
    runs-on: ubuntu-latest
    needs: verify
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event.inputs.deploy_target == 'production'
    environment: production
    concurrency:
      group: api-production-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: api
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: api/.nvmrc
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy production worker
        run: npm run deploy
