name: Launch Web Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'apps/launch-web/**'
      - 'shared/contracts/launch.ts'
      - '.github/workflows/launch-web-deploy.yml'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy staging or production.'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  verify:
    name: Verify launch web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/launch-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build staging bundle
        run: pnpm run build:staging

      - name: Build production bundle
        run: pnpm run build:production

  deploy_staging:
    name: Deploy launch web to staging Pages
    runs-on: ubuntu-latest
    needs: verify
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.deploy_target == 'staging'
    environment: staging
    concurrency:
      group: launch-web-staging-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: apps/launch-web
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build staging bundle
        run: pnpm run build:staging

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_PAGES_PROJECT: ultralight-launch-web
        run: |
          set -euo pipefail

          project_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT}"
          status="$(curl -sS -o /tmp/pages-project.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${project_url}")"

          if [[ "${status}" == "200" ]]; then
            echo "Cloudflare Pages project ${CLOUDFLARE_PAGES_PROJECT} already exists."
            exit 0
          fi

          if [[ "${status}" != "404" ]]; then
            echo "Unexpected Cloudflare Pages project lookup response: ${status}" >&2
            cat /tmp/pages-project.json >&2
            exit 1
          fi

          echo "Creating Cloudflare Pages project ${CLOUDFLARE_PAGES_PROJECT}."
          create_status="$(curl -sS -o /tmp/pages-project-create.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"${CLOUDFLARE_PAGES_PROJECT}\",\"production_branch\":\"main\"}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects")"

          if [[ "${create_status}" != "200" && "${create_status}" != "201" ]]; then
            echo "Cloudflare Pages project create failed: ${create_status}" >&2
            cat /tmp/pages-project-create.json >&2
            exit 1
          fi

      - name: Deploy staging Pages branch
        run: pnpm dlx wrangler@4.67.0 pages deploy dist --project-name ultralight-launch-web --branch staging

  deploy_production:
    name: Deploy launch web to production Pages
    runs-on: ubuntu-latest
    needs: verify
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event.inputs.deploy_target == 'production'
    environment: production
    concurrency:
      group: launch-web-production-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: apps/launch-web
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm run build:production

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_PAGES_PROJECT: ultralight-launch-web
        run: |
          set -euo pipefail

          project_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT}"
          status="$(curl -sS -o /tmp/pages-project.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${project_url}")"

          if [[ "${status}" == "200" ]]; then
            echo "Cloudflare Pages project ${CLOUDFLARE_PAGES_PROJECT} already exists."
            exit 0
          fi

          if [[ "${status}" != "404" ]]; then
            echo "Unexpected Cloudflare Pages project lookup response: ${status}" >&2
            cat /tmp/pages-project.json >&2
            exit 1
          fi

          echo "Creating Cloudflare Pages project ${CLOUDFLARE_PAGES_PROJECT}."
          create_status="$(curl -sS -o /tmp/pages-project-create.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"${CLOUDFLARE_PAGES_PROJECT}\",\"production_branch\":\"main\"}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects")"

          if [[ "${create_status}" != "200" && "${create_status}" != "201" ]]; then
            echo "Cloudflare Pages project create failed: ${create_status}" >&2
            cat /tmp/pages-project-create.json >&2
            exit 1
          fi

      - name: Deploy production Pages branch
        run: pnpm dlx wrangler@4.67.0 pages deploy dist --project-name ultralight-launch-web --branch main
