name: Launch Guardrails

on:
  pull_request:
    paths:
      - 'api/**'
      - 'desktop/**'
      - 'shared/**'
      - 'sdk/**'
      - 'web/**'
      - 'scripts/checks/**'
      - 'migration-*.sql'
      - '.gitignore'
      - '.nvmrc'
      - '.github/workflows/launch-guardrails.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'desktop/**'
      - 'shared/**'
      - 'sdk/**'
      - 'web/**'
      - 'scripts/checks/**'
      - 'migration-*.sql'
      - '.gitignore'
      - '.nvmrc'
      - '.github/workflows/launch-guardrails.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guardrails:
    name: Check launch guardrails
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Guardrail baseline
        run: node scripts/checks/run-guardrail-checks.mjs
