# Ultralight Interfaces sandbox worker (Interfaces PR3).
#
# Serves developer-shipped interface HTML from the dedicated content-addressed
# R2 prefix interfaces/{appId}/{sha256}.html — and ONLY that prefix. This
# worker is a distinct origin from the launch website (production:
# interfaces.ultralightagent.com vs ultralightagent.com).
#
# NOTE: under the ultralightagent.com layout these two are SAME-SITE (shared
# registrable domain) rather than cross-site as they were on workers.dev/
# pages.dev. The actual isolation does NOT rely on the site boundary: every
# response carries CSP `sandbox` WITHOUT allow-same-origin (src/serve.ts), so
# the developer HTML runs in an opaque origin with no access to any origin's
# cookies/storage, this worker sets no cookies ever, and platform auth is
# bearer-token only. The separate origin + frame-ancestors remain defense in
# depth.
#
# Security posture lives in src/serve.ts: CSP `sandbox` header suite, no
# cookies ever, immutable content-addressed caching.

name = "ultralight-interfaces"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "ultralight-apps"

[vars]
ENVIRONMENT = "production"
# Space-separated CSP frame-ancestors source list: which pages may embed
# interfaces. Unset/empty fails closed to 'none'.
FRAME_ANCESTORS = "https://ultralightagent.com"

[env.staging]
name = "ultralight-interfaces-staging"

[[env.staging.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "ultralight-apps"

[env.staging.vars]
ENVIRONMENT = "staging"
FRAME_ANCESTORS = "https://staging.ultralight-launch-web.pages.dev http://localhost:5173 http://127.0.0.1:5173 http://localhost:5178 http://127.0.0.1:5178"
