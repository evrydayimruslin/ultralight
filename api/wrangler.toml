name = "ultralight-api"
main = "src/worker-entry.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

# Bundle .wasm files as WebAssembly modules so esbuild-wasm can load its
# compiled wasm binary at runtime. Without this, `import('esbuild-wasm/esbuild.wasm')`
# fails with "No such module" and the upload pipeline's ESM bundler silently dies,
# leaving KV caches stale and app runtimes serving ancient code.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# R2 bucket binding — native access to ultralight-apps bucket
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "ultralight-apps"

# KV namespace for compiled code cache
[[kv_namespaces]]
binding = "CODE_CACHE"
id = "d348ee797036460faf4b3e014921f0b0"

# KV namespace for per-user function indexes
[[kv_namespaces]]
binding = "FN_INDEX"
id = "75ce02786ac2466fbca833c95bf3cb56"

# Dynamic Workers — enables env.LOADER.load() for sandboxed code execution
[[worker_loaders]]
binding = "LOADER"

# Self-referencing service binding for internal fetch from Dynamic Workers
[[services]]
binding = "SELF"
service = "ultralight-api"

# Durable-execution queue: async-class function calls are enqueued at dispatch
# time and executed by this same worker's queue() consumer (15-min wall budget
# per INVOCATION — what makes >120s inference jobs actually complete).
# max_batch_size MUST stay 1: messages are processed serially and each job may
# legitimately hold the consumer for its full 300s budget — batching N jobs
# stacks budgets past the 15-min wall and kills healthy claimed executions.
# Throughput comes from Queues' consumer auto-scaling, not batching.
# Provision before deploy:
#   wrangler queues create ultralight-exec
#   wrangler queues create ultralight-exec-dlq
[[queues.producers]]
binding = "EXEC_QUEUE"
queue = "ultralight-exec"

[[queues.consumers]]
queue = "ultralight-exec"
max_batch_size = 1
max_batch_timeout = 2
max_retries = 3
dead_letter_queue = "ultralight-exec-dlq"

# Event-bus dispatch queue: ultralight.emit enqueues {eventId}; the consumer
# performs the fan-out with bounded concurrency (per-delivery at-most-once is
# the delivery-row claim, exactly as the cron path). max_batch_size stays 1
# for the same wall-budget reason as the exec queue — one event's fan-out can
# legitimately hold an invocation for minutes.
# Provision before deploy:
#   wrangler queues create ultralight-events
#   wrangler queues create ultralight-events-dlq
[[queues.producers]]
binding = "EVENT_QUEUE"
queue = "ultralight-events"

[[queues.consumers]]
queue = "ultralight-events"
max_batch_size = 1
max_batch_timeout = 2
max_retries = 3
dead_letter_queue = "ultralight-events-dlq"

[vars]
BASE_URL = "https://api.connectgalactic.com"
LAUNCH_WEB_BASE_URL = "https://connectgalactic.com"
# Interfaces sandbox worker origin (interfaces-worker/) — explicit config,
# never derived from the request Host. Unset disables interface exposure.
INTERFACE_SANDBOX_BASE_URL = "https://interfaces.connectgalactic.com"
ENVIRONMENT = "production"
# Executed-bundle integrity: enforce blocks a call when the running ESM bundle
# does not match its signed attestation (bad_signature / hash_mismatch only;
# legacy unsigned + deploy-skew never block). observe = log only; off = skip.
EXECUTED_BUNDLE_VERIFY = "enforce"
# Strip-the-sidecar defense — second-stage rollout (default OFF). When "1",
# no_attestation also blocks under enforce, closing the "write the live bundle
# WITHOUT a sidecar to dodge verification" path. Flip ON only AFTER the backfill
# below reports zero legitimately-unattested bundles, else legacy apps break.
# EXECUTED_BUNDLE_REQUIRE_ATTESTATION = "1"
# One-shot backfill (default OFF). When "1", the hourly cron re-attests any
# still-unattested live bundle (idempotent). Set "1", deploy, watch the
# [BUNDLE-BACKFILL] log report attested=0, then unset and flip require-attestation.
# EXECUTED_BUNDLE_BACKFILL = "1"
# New primary domain is connectgalactic.com; the old ultralightagent.com origins
# stay listed so they keep working during the cutover (remove later).
CORS_ALLOWED_ORIGINS = "https://api.connectgalactic.com,https://connectgalactic.com,https://api.ultralightagent.com,https://ultralightagent.com"
GPU_SUPPORT_ENABLED = "false"
# Free Mode (docs/FREE_MODE_DESIGN.md): when a wallet balance is under $0.25,
# only free/self/owner-sponsored functions run, AI functions need a BYOK key,
# and paid functions are hidden + blocked before any debit. Enabled for launch.
# Requires migration 20260625000000_free_mode_hold_gate (the p_free_mode hold
# arg) to be applied first — it ships ahead of the API via the supabase-db CI.
FREE_MODE = "1"
SUPABASE_URL = "https://uavjzycsltdnwblwutmb.supabase.co"
CF_ACCOUNT_ID = "8d2df08dac65694aa1c6bf56233a2090"
# Optional rollout knob for Wave 4 alias retirement:
# PLATFORM_MCP_DISABLED_ALIASES = "removable"
# or a comma-separated subset such as "ul.execute,ul.lint"
# Pre-install defaults (docs/PLATFORM_MGMT_AGENT_DESIGN.md): the slug of the
# private "Defaults Manager" Agent whose stored list seeds new accounts. Unset =>
# no defaults are seeded. Not an authority — just the data source for the starter
# list; the Agent's functions are owner-only because it is private.
DEFAULTS_SOURCE_APP = "app-5vyb54"

[env.staging]
# Staging gets its own worker script name (`ultralight-api-staging`) and its
# own runtime secrets / vars, while temporarily sharing the same R2 + KV
# bindings as production. This keeps auth, database, and hostname isolation in
# place now without blocking staging on new Cloudflare resource provisioning.
#
# If we later want full Cloudflare-side isolation, replace these binding IDs
# and bucket names with staging-specific resources.
[[env.staging.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "ultralight-apps"

[[env.staging.kv_namespaces]]
binding = "CODE_CACHE"
id = "d348ee797036460faf4b3e014921f0b0"

[[env.staging.kv_namespaces]]
binding = "FN_INDEX"
id = "75ce02786ac2466fbca833c95bf3cb56"

[[env.staging.worker_loaders]]
binding = "LOADER"

[[env.staging.services]]
binding = "SELF"
service = "ultralight-api-staging"

# Provision before deploy:
#   wrangler queues create ultralight-exec-staging
#   wrangler queues create ultralight-exec-staging-dlq
[[env.staging.queues.producers]]
binding = "EXEC_QUEUE"
queue = "ultralight-exec-staging"

[[env.staging.queues.consumers]]
queue = "ultralight-exec-staging"
max_batch_size = 1
max_batch_timeout = 2
max_retries = 3
dead_letter_queue = "ultralight-exec-staging-dlq"

# Provision before deploy:
#   wrangler queues create ultralight-events-staging
#   wrangler queues create ultralight-events-staging-dlq
[[env.staging.queues.producers]]
binding = "EVENT_QUEUE"
queue = "ultralight-events-staging"

[[env.staging.queues.consumers]]
queue = "ultralight-events-staging"
max_batch_size = 1
max_batch_timeout = 2
max_retries = 3
dead_letter_queue = "ultralight-events-staging-dlq"

[env.staging.vars]
BASE_URL = "https://ultralight-api-staging.rgn4jz429m.workers.dev"
LAUNCH_WEB_BASE_URL = "https://staging.ultralight-launch-web.pages.dev"
INTERFACE_SANDBOX_BASE_URL = "https://ultralight-interfaces-staging.rgn4jz429m.workers.dev"
ENVIRONMENT = "staging"
# Executed-bundle integrity enforcement (see [vars] above).
EXECUTED_BUNDLE_VERIFY = "enforce"
CORS_ALLOWED_ORIGINS = "https://ultralight-api-staging.rgn4jz429m.workers.dev,https://staging.ultralight-launch-web.pages.dev,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5178,http://127.0.0.1:5178"
GPU_SUPPORT_ENABLED = "false"
# Routines are a deferred capability with no prod schema; staging has the full
# migration set, so it runs the per-minute executor while prod (top-level [vars],
# flag unset) skips it. See api/services/routines-feature-flag.ts.
ROUTINES_ENABLED = "1"
# Mirror production: Free Mode on in staging so the staging smoke exercises the
# paid-call/AI-without-BYOK gates before production promotion.
FREE_MODE = "1"
# Isolated staging Supabase project (previously pointed at the prod project).
SUPABASE_URL = "https://mtekfhozmsboxizxxxyn.supabase.co"
CF_ACCOUNT_ID = "8d2df08dac65694aa1c6bf56233a2090"
# Optional rollout knob for Wave 4 alias retirement:
# PLATFORM_MCP_DISABLED_ALIASES = "removable"

# Cron triggers for scheduled worker
[triggers]
crons = [
  "* * * * *",       # every minute: async cleanup, holds, embeddings, gpu builds, routines, event dispatch
  "*/5 * * * *",     # every 5 min: D1 billing
  "0 * * * *",       # hourly: hosting billing, payout processor
  "*/30 * * * *",    # every 30 min: auto-healing
]

# Secrets (configured via: wrangler secret put <NAME>):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   SUPABASE_ANON_KEY
#   CF_ACCOUNT_ID
#   CF_API_TOKEN
#   STRIPE_SECRET_KEY
#   STRIPE_PUBLISHABLE_KEY
#   STRIPE_WEBHOOK_SECRET
#   OPENROUTER_API_KEY
#   DEEPSEEK_API_KEY
#   BYOK_ENCRYPTION_KEY
#   DATA_TENANT_SECRET — per-tenant proof signing secret for the ultralight-data
#     worker. MUST be identical to the data worker's DATA_TENANT_SECRET and be a
#     non-default value, or the data worker refuses to serve in production
#     (fail-closed). See docs/DATA_WORKER_RELIGHT.md.
#   AGENT_CALLER_SECRET — HMAC key for cross-Agent caller-context tokens (P5).
#     MUST be a server-only secret; deliberately distinct from WORKER_SECRET
#     (which is exposed inside the sandbox). Falls back to
#     ROUTINE_ACTOR_TOKEN_SECRET / SUPABASE_SERVICE_ROLE_KEY if unset.
#   RUNPOD_API_KEY
#   GPU_SUPPORT_ENABLED=true|false
#   RUNPOD_TEMPLATE_ID
#   RUNPOD_BASE_IMAGE
#   RUNPOD_CONTAINER_REGISTRY_AUTH_ID
#   GPU_INTERNAL_SECRET
#   GITHUB_ACTIONS_TOKEN or GITHUB_APP_ID/GITHUB_APP_PRIVATE_KEY/GITHUB_INSTALLATION_ID
#   GITHUB_BUILD_REPO
#   GITHUB_BUILD_WORKFLOW_ID
#   GITHUB_BUILD_REF
#   GHCR_IMAGE_NAMESPACE
#   GPU_BUILD_CALLBACK_SECRET
#   GPU_BUILD_LIGHT_PER_MINUTE
#   GPU_BASE_IMAGE_PYTHON_CUDA
#   GPU_BASE_IMAGE_TORCH_CUDA
#   GPU_BASE_IMAGE_PYTHON_CUDA_SIZE_BYTES
#   GPU_BASE_IMAGE_TORCH_CUDA_SIZE_BYTES
#   SUPABASE_MGMT_OAUTH_CLIENT_ID
#   SUPABASE_MGMT_OAUTH_CLIENT_SECRET
#   TIER_CHANGE_SECRET
#   GPU_SECRET
#   ANALYTICS_PEPPER_V1
#
# Optional vars/secrets for chat capture:
#   CHAT_CAPTURE_ENABLED=true|false
#   CHAT_CAPTURE_ARTIFACTS_ENABLED=true|false
#   CHAT_CAPTURE_MAX_INLINE_BYTES=64000
#   ANALYTICS_PEPPER_VERSION=v1
