<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Deploy Agents any existing agent can install, run, compose, and pay for."
    />
    <!-- Open Graph / social share card. og.svg is the editable source; social
         platforms don't render SVG, so og:image points at the exported PNG
         (1200x630) — keep public/og.png in sync when og.svg changes. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Galactic" />
    <meta property="og:title" content="Connect once. Access every tool." />
    <meta
      property="og:description"
      content="Add Galactic to your agent — call any tool on the platform. One auth, one balance. Pay per call."
    />
    <meta property="og:url" content="https://connectgalactic.com/" />
    <meta property="og:image" content="https://connectgalactic.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Connect once. Access every tool." />
    <meta
      name="twitter:description"
      content="Add Galactic to your agent — call any tool on the platform. One auth, one balance. Pay per call."
    />
    <meta name="twitter:image" content="https://connectgalactic.com/og.png" />
    <!-- Theme-aware favicon. The static <link> is the no-JS fallback (its own
         media query covers Firefox/Safari); favicon-theme.js swaps black/white
         for Chromium, which ignores prefers-color-scheme inside SVG favicons. -->
    <link id="favicon" rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script src="/favicon-theme.js"></script>
    <title>Galactic</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
