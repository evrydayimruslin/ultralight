<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Deploy Agents any existing agent can install, run, compose, and pay for."
    />
    <!-- Theme-adaptive SVG favicon (switches with the OS light/dark setting),
         with PNG fallbacks for browsers that don't render SVG favicons. -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32-dark.png"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16-dark.png"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Ultralight Launch</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
