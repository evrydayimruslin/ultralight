<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <script>
      (function () {
        var surfaceId = null;

        function post(type, payload) {
          parent.postMessage(
            Object.assign({ type: type, surfaceId: surfaceId }, payload || {}),
            "*",
          );
        }

        window.addEventListener("message", function (event) {
          var data = event.data;
          if (!data || typeof data !== "object") return;
          if (data.type !== "ul-widget-load" || typeof data.html !== "string") {
            return;
          }
          surfaceId = typeof data.surfaceId === "string" ? data.surfaceId : null;
          document.open();
          document.write(data.html);
          document.close();
        });

        post("ul-widget-frame-ready");
      })();
    </script>
  </body>
</html>
